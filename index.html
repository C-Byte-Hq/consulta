<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗳️ Votación Comunitaria para propuesta de proyecto a elegir el 12 de Julio del 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <!-- Encabezado -->
        <div class="bg-gradient-to-r from-indigo-600 to-violet-700 p-6 md:p-8 text-white text-center">
            <h1 class="text-2xl md:text-3xl font-extrabold mb-2 tracking-tight">🗳️ Control de Votaciones</h1>
            <p class="text-indigo-100 text-sm">Organizado por edificio y proyecto. Sin registros ni logins necesarios.</p>
        </div>

        <div class="p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Formulario -->
            <div class="bg-slate-50 p-6 rounded-xl border border-slate-200">
                <h2 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <span class="bg-indigo-100 text-indigo-700 w-6 h-6 flex items-center justify-center rounded-full text-xs">1</span>
                    Registrar Voto
                </h2>

                <form id="voteForm" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">¿A qué edificio perteneces?</label>
                        <select id="edificio" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                            <option value="" disabled selected>Selecciona tu edificio...</option>
                            <option value="Edificio 8">🏢 Edificio A</option>
                            <option value="Edificio 9">🏢 Edificio B</option>
                            <option value="Edificio 10">🏢 Edificio C</option>
                            <option value="Edificio 11">🏢 Edificio D</option>
                            <option value="Edificio 12">🏢 Edificio D</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">¿Por cuál proyecto votas?</label>
                        <select id="proyecto" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                            <option value="" disabled selected>Selecciona un proyecto...</option>
                            <option value="Proyecto 1: Cámaras de Seguridad">📹 Proyecto 1: Cámaras de Seguridad</option>
                            <option value="Proyecto 2: Remodelación de Fachada">🧱 Proyecto 2: Remodelación de Fachada</option>
                            <option value="Proyecto 3: Iluminación LED">💡 Proyecto 3: Iluminación LED</option>
                        </select>
                    </div>

                    <button type="submit" id="btnSubmit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition transform active:scale-95 cursor-pointer flex justify-center items-center">
                        <span>Procesar Voto Failsafe</span>
                    </button>
                </form>
                <div id="statusMessage" class="mt-4 p-3 rounded-lg hidden text-center text-sm font-semibold"></div>
            </div>

            <!-- Gráficos -->
            <div>
                <h2 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <span class="bg-emerald-100 text-emerald-700 w-6 h-6 flex items-center justify-center rounded-full text-xs">2</span>
                    Escrutinio por Edificio
                </h2>
                <div id="resultsContainer" class="space-y-4">
                    <p class="text-slate-400 text-center py-8 text-sm">Cargando matriz de datos...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU REPOSITORIO (Modifica esto)
        const OWNER = "C-Byte-Hq";
        const REPO = "consulta";
        const FILE_PATH = "votos.json";
        
        // ⚠️ INSTRUCCIONES DEL TOKEN ABAJO EN EL PASO 3
        const CONFIG_TOKEN = "Z2l0aHViX3BhdF8xMUI3STVZRUEwWGVpNHFkZUI0Q3ZzX1JLQjJnOU5JV3RCZ2dyWUp2eTlKTGtVSVA2YTVOQ1BFYk1BQ0RyVVQ0TkRSQ0ZHU0lPTnNxTEJKWGJ4"; 
        const getTk = () => atob(CONFIG_TOKEN);

        const form = document.getElementById('voteForm');
        const statusMsg = document.getElementById('statusMessage');
        const btnSubmit = document.getElementById('btnSubmit');

        // Obtener datos actuales de GitHub
        async function getFileContent() {
            const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
            const res = await fetch(url, {
                headers: { "Authorization": `token ${getTk()}`, "Accept": "application/vnd.github.v3+json" }
            });
            if (!res.ok) throw new Error("Error al leer base de datos.");
            const data = await res.json();
            return { sha: data.sha, content: JSON.parse(atob(data.content)) };
        }

        // Renderizar los resultados con barras estéticas
        async function loadResults() {
            try {
                const { content } = await getFileContent();
                const container = document.getElementById('resultsContainer');
                container.innerHTML = '';

                for (const edificio in content) {
                    let edificioHTML = `
                        <div class="bg-white border border-slate-100 shadow-sm rounded-xl p-4 mb-2">
                            <h3 class="font-bold text-slate-800 text-sm border-b border-slate-100 pb-2 mb-3 flex justify-between">
                                <span>${edificio}</span>
                            </h3>
                            <div class="space-y-3">
                    `;

                    const proyectos = content[edificio];
                    if (Object.keys(proyectos).length === 0) {
                        edificioHTML += `<p class="text-xs text-slate-400 italic">Sin votos aún.</p>`;
                    } else {
                        // Calcular total de votos del edificio para porcentajes reales
                        const totalEdificio = Object.values(proyectos).reduce((a, b) => a + b, 0);

                        for (const proj in proyectos) {
                            const numVotos = proyectos[proj];
                            const porcentaje = totalEdificio > 0 ? Math.round((numVotos / totalEdificio) * 100) : 0;
                            edificioHTML += `
                                <div>
                                    <div class="flex justify-between text-xs font-medium text-slate-600 mb-1">
                                        <span class="truncate max-w-[200px]">${proj}</span>
                                        <span class="bg-slate-100 text-slate-700 px-2 py-0.5 rounded text-[10px] font-bold">${numVotos} v (${porcentaje}%)</span>
                                    </div>
                                    <div class="w-full bg-slate-100 rounded-full h-2">
                                        <div class="bg-indigo-500 h-2 rounded-full" style="width: ${porcentaje}%"></div>
                                    </div>
                                </div>
                            `;
                        }
                    }
                    edificioHTML += `</div></div>`;
                    container.innerHTML += edificioHTML;
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Enviar el voto directamente mediante commit de la API
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (localStorage.getItem(`voto_${REPO}`)) {
                showStatus("Ya has registrado un voto desde este dispositivo.", "bg-amber-50 text-amber-700 border border-amber-200");
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerText = "Sincronizando con GitHub...";

            const edifSeleccionado = document.getElementById('edificio').value;
            const projSeleccionado = document.getElementById('proyecto').value;

            try {
                // Leer versión más fresca para evitar colisiones de concurrencia
                const { sha, content } = await getFileContent();

                // Sumar voto a la matriz relacional
                if (!content[edifSeleccionado]) content[edifSeleccionado] = {};
                content[edifSeleccionado][projSeleccionado] = (content[edifSeleccionado][projSeleccionado] || 0) + 1;

                // Escribir de vuelta a GitHub vía API commit
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
                const bodyJson = {
                    message: `🗳️ Voto anónimo procesado [${edifSeleccionado}]`,
                    content: btoa(JSON.stringify(content, null, 2)),
                    sha: sha
                };

                const writeRes = await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": `token ${getTk()}`, "Content-Type": "application/json" },
                    body: JSON.stringify(bodyJson)
                });

                if (writeRes.ok) {
                    showStatus("¡Voto computado exitosamente en el repositorio!", "bg-emerald-50 text-emerald-700 border border-emerald-200");
                    localStorage.setItem(`voto_${REPO}`, 'true');
                    form.reset();
                    await loadResults();
                } else {
                    throw new Error();
                }

            } catch (error) {
                showStatus("Error de concurrencia de red. Reintenta en 3 segundos.", "bg-rose-50 text-rose-700 border border-rose-200");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Procesar Voto Failsafe";
            }
        });

        function showStatus(msg, classes) {
            statusMsg.innerText = msg;
            statusMsg.className = `mt-4 p-3 rounded-lg text-center text-sm font-semibold ${classes}`;
            statusMsg.classList.remove('hidden');
        }

        // Carga inicial
        loadResults();
    </script>
</body>
</html>
