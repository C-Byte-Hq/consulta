<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗳️ Votación Comunitaria para propuesta de proyecto a elegir el 12 de Julio del 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <div class="bg-gradient-to-r from-indigo-600 to-violet-700 p-6 md:p-8 text-white text-center">
            <h1 class="text-2xl md:text-3xl font-extrabold mb-2 tracking-tight">🗳️ Control de Votaciones</h1>
            <p class="text-indigo-100 text-sm">Organizado por edificio y proyecto. Sin registros ni logins necesarios.</p>
        </div>

        <div class="p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-slate-50 p-6 rounded-xl border border-slate-200">
                <h2 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <span class="bg-indigo-100 text-indigo-700 w-6 h-6 flex items-center justify-center rounded-full text-xs">1</span>
                    Registrar Voto
                </h2>

                <form id="voteForm" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">¿A qué edificio perteneces?</label>
                        <select id="edificio" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                            <option value="" disabled selected>Selecciona tu edificio...</option>
                            <option value="Edificio 8">🏢 Edificio 8</option>
                            <option value="Edificio 9">🏢 Edificio 9</option>
                            <option value="Edificio 10">🏢 Edificio 10</option>
                            <option value="Edificio 11">🏢 Edificio 11</option>
                            <option value="Edificio 12">🏢 Edificio 12</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">¿Por cuál proyecto votas?</label>
                        <div class="space-y-3">
                            <label class="flex items-start gap-3 p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-indigo-50/50 transition">
                                <input type="radio" name="proyecto" value="Poda de árboles y escombros" required class="mt-1 accent-indigo-600 h-4 w-4">
                                <span class="text-sm text-slate-700">🌲 Poda de árboles peligrosos y recolección de escombros ecológicos</span>
                            </label>

                            <label class="flex items-start gap-3 p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-indigo-50/50 transition">
                                <input type="radio" name="proyecto" value="Cercado de alfajol" class="mt-1 accent-indigo-600 h-4 w-4">
                                <span class="text-sm text-slate-700">🚧 Cerca de alfajol por la camineria del bloque 1 desde la pared de la escuela hasta el nivel del parquecito y cercado en bloque 6 desde la curva casi hasta la línea de taxis</span>
                            </label>

                            <label class="flex items-start gap-3 p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-indigo-50/50 transition">
                                <input type="radio" name="proyecto" value="Cámaras de vigilancia" class="mt-1 accent-indigo-600 h-4 w-4">
                                <span class="text-sm text-slate-700">📹 Cámaras de vigilancia externa e internamente</span>
                            </label>

                            <label class="flex items-start gap-3 p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-indigo-50/50 transition">
                                <input type="radio" name="proyecto" value="Filtraciones en tanques" class="mt-1 accent-indigo-600 h-4 w-4">
                                <span class="text-sm text-slate-700">💧 Reparación de filtraciones en tanques de agua subterráneo y aéreos</span>
                            </label>

                            <label class="flex items-start gap-3 p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-indigo-50/50 transition">
                                <input type="radio" name="proyecto" value="Mantenimiento de áreas comunes" class="mt-1 accent-indigo-600 h-4 w-4">
                                <span class="text-sm text-slate-700">🛠️ Mantenimiento y reparación residencial en áreas comunes de las edificaciones: plomería, albañilería, electricidad, jardinería, herrería, estructura física, entre otros</span>
                            </label>

                            <label class="flex items-start gap-3 p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:bg-indigo-50/50 transition">
                                <input type="radio" name="proyecto" value="Sustitución de tuberías" class="mt-1 accent-indigo-600 h-4 w-4">
                                <span class="text-sm text-slate-700">🚰 Sustitución de tuberías de aguas servidas y blancas que están ocasionando filtraciones en la estructura física de las edificaciones</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" id="btnSubmit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition transform active:scale-95 cursor-pointer flex justify-center items-center">
                        <span>Procesar Voto Failsafe</span>
                    </button>
                </form>
                <div id="statusMessage" class="mt-4 p-3 rounded-lg hidden text-center text-sm font-semibold"></div>
            </div>

            <div>
                <h2 class="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <span class="bg-emerald-100 text-emerald-700 w-6 h-6 flex items-center justify-center rounded-full text-xs">2</span>
                    Escrutinio por Edificio
                </h2>
                <div id="resultsContainer" class="space-y-4">
                    <p class="text-slate-400 text-center py-8 text-sm">Cargando matriz de datos...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU REPOSITORIO
        const OWNER = "C-Byte-Hq";
        const REPO = "consulta";
        const FILE_PATH = "votos.json";
        
        const CONFIG_TOKEN = "Z2l0aHViX3BhdF8xMUI3STVZRUEwMnlwa3ZmSE1Zdno3X2I2Wlp1Q3huYW9pV3NZS2RjSVI0Rmw4b3UzYlBma3oxMXRRNjdEM2V6RXlPRzVXRlIyWUxiTFVHaWoz"; 
        const getTk = () => atob(CONFIG_TOKEN);

        const form = document.getElementById('voteForm');
        const statusMsg = document.getElementById('statusMessage');
        const btnSubmit = document.getElementById('btnSubmit');

        // Helper para codificar strings con soporte UTF-8 a Base64 sin romper emojis
        function utoa(str) {
            return btoa(String.fromCharCode(...new TextEncoder().encode(str)));
        }

        // Helper para decodificar Base64 conteniendo UTF-8
        function atou(str) {
            return new TextDecoder().decode(Uint8Array.from(atob(str), c => c.charCodeAt(0)));
        }

        // Obtener datos actuales de GitHub sin provocar bloqueos de CORS
        async function getFileContent() {
            const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}?t=${Date.now()}`;
            const res = await fetch(url, {
                headers: { 
                    "Authorization": `token ${getTk()}`, 
                    "Accept": "application/vnd.github.v3+json"
                }
            });
            if (!res.ok) throw new Error("Error al leer base de datos.");
            const data = await res.json();
            return { sha: data.sha, content: JSON.parse(atou(data.content)) };
        }

        // Renderizar los resultados con barras estéticas
        async function loadResults() {
            try {
                const { content } = await getFileContent();
                const container = document.getElementById('resultsContainer');
                container.innerHTML = '';

                for (const edificio in content) {
                    let edificioHTML = `
                        <div class="bg-white border border-slate-100 shadow-sm rounded-xl p-4 mb-2">
                            <h3 class="font-bold text-slate-800 text-sm border-b border-slate-100 pb-2 mb-3 flex justify-between">
                                <span>${edificio}</span>
                            </h3>
                            <div class="space-y-3">
                    `;

                    const proyectos = content[edificio];
                    if (!proyectos || Object.keys(proyectos).length === 0) {
                        edificioHTML += `<p class="text-xs text-slate-400 italic">Sin votos aún.</p>`;
                    } else {
                        const totalEdificio = Object.values(proyectos).reduce((a, b) => a + b, 0);

                        for (const proj in proyectos) {
                            const numVotos = proyectos[proj];
                            const porcentaje = totalEdificio > 0 ? Math.round((numVotos / totalEdificio) * 100) : 0;
                            edificioHTML += `
                                <div>
                                    <div class="flex justify-between text-xs font-medium text-slate-600 mb-1">
                                        <span class="truncate max-w-[200px]">${proj}</span>
                                        <span class="bg-slate-100 text-slate-700 px-2 py-0.5 rounded text-[10px] font-bold">${numVotos} v (${porcentaje}%)</span>
                                    </div>
                                    <div class="w-full bg-slate-100 rounded-full h-2">
                                        <div class="bg-indigo-500 h-2 rounded-full" style="width: ${porcentaje}%"></div>
                                    </div>
                                </div>
                            `;
                        }
                    }
                    edificioHTML += `</div></div>`;
                    container.innerHTML += edificioHTML;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('resultsContainer').innerHTML = `<p class="text-rose-500 text-center py-8 text-sm">Error al cargar la matriz de datos.</p>`;
            }
        }

        function showStatus(text, classes) {
            statusMsg.innerText = text;
            statusMsg.className = `mt-4 p-3 rounded-lg text-center text-sm font-semibold ${classes}`;
            statusMsg.classList.remove('hidden');
        }

        // Enviar el voto directamente mediante commit de la API
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (localStorage.getItem(`voto_${REPO}`)) {
                showStatus("Ya has registrado un voto desde este dispositivo.", "bg-amber-50 text-amber-700 border border-amber-200");
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerText = "Sincronizando con GitHub...";

            const edifSeleccionado = document.getElementById('edificio').value;
            const radioChecked = document.querySelector('input[name="proyecto"]:checked');
            
            if (!radioChecked) {
                showStatus("Por favor, selecciona un proyecto.", "bg-amber-50 text-amber-700 border border-amber-200");
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Procesar Voto Failsafe";
                return;
            }
            
            const projSeleccionado = radioChecked.value;

            try {
                const { sha, content } = await getFileContent();

                if (!content[edifSeleccionado]) content[edifSeleccionado] = {};
                content[edifSeleccionado][projSeleccionado] = (content[edifSeleccionado][projSeleccionado] || 0) + 1;

                const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
                const bodyJson = {
                    message: `🗳️ Voto anónimo procesado [${edifSeleccionado}]`,
                    content: utoa(JSON.stringify(content, null, 2)),
                    sha: sha
                };

                const writeRes = await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": `token ${getTk()}`, "Content-Type": "application/json" },
                    body: JSON.stringify(bodyJson)
                });

                if (writeRes.ok) {
                    showStatus("¡Voto computado exitosamente en el repositorio!", "bg-emerald-50 text-emerald-700 border border-emerald-200");
                    localStorage.setItem(`voto_${REPO}`, 'true');
                    form.reset();
                    await loadResults();
                } else {
                    throw new Error();
                }

            } catch (error) {
                showStatus("Error de concurrencia de red o colisión de datos. Reintenta.", "bg-rose-50 text-rose-700 border border-rose-200");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Procesar Voto Failsafe";
            }
        });

        // Cargar los resultados al iniciar la página de inmediato
        loadResults();
    </script>
</body>
</html>
